spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/users/**

        - id: product-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/products/**

        - id: order-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/payments/**

server:
  port: 8080
app:
  jwt:
    secret: mySecretKeyThatIsAtLeast256BitsLongForHS256Algorithm

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    export:
      prometheus:
        enabled: true